<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
    html, body { height: 100%; overflow: hidden; background: #fff; color: #181716; font-size: 13px; }

    body { display: flex; }

    /* ── Sidebar ─────────────────────────────── */
    #sidebar {
      width: 56px; flex-shrink: 0;
      background: #fff;
      border-right: 0.7px solid #f2f1f0;
      display: flex; flex-direction: column; align-items: center;
      padding: 0; gap: 0; z-index: 10; height: 100vh;
    }
    .sidebar-logo {
      width: 56px; height: 56px; display: flex; align-items: center; justify-content: center;
      border-bottom: 0.7px solid #f2f1f0; flex-shrink: 0;
    }
    .sidebar-nav { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 2px; overflow: hidden; }
    .nav-icon {
      width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #9b978f; transition: background 0.12s, color 0.12s;
    }
    .nav-icon:hover { background: #f2f1f0; color: #64615c; }
    .nav-icon.active { background: #f2f1f0; color: #181716; }
    .nav-divider { width: 28px; height: 0.5px; background: #f2f1f0; margin: 4px 0; flex-shrink: 0; }
    .sidebar-avatar { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; border-top: 0.7px solid #f2f1f0; flex-shrink: 0; }
    .av-circle { width: 32px; height: 32px; border-radius: 9999px; background: #fde68a; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #92400e; }

    /* ── Main area ───────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Top bar ─────────────────────────────── */
    #topbar {
      height: 56px; flex-shrink: 0;
      border-bottom: 0.7px solid #f2f1f0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; gap: 12px;
    }
    #topbar-title { font-size: 18px; font-weight: 600; color: #181716; line-height: 1; }
    #topbar-right { display: flex; align-items: center; gap: 8px; }
    .org-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 8px; border-radius: 8px; cursor: pointer;
      border: none; background: none; font-size: 12px; color: #181716; font-weight: 500;
    }
    .org-btn:hover { background: #f2f1f0; }
    .org-dot { width: 18px; height: 18px; border-radius: 9999px; background: #1967d4; display: flex; align-items: center; justify-content: center; }
    .locked-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: 9999px; border: 0.7px solid #e1dfdd;
      font-size: 11px; color: #64615c; cursor: pointer; background: white;
    }
    .locked-pill:hover { background: #f8f7f6; }
    .toggle-track {
      width: 28px; height: 16px; border-radius: 9999px; background: #d1cdc7;
      position: relative; transition: background 0.2s;
    }
    .toggle-knob {
      width: 12px; height: 12px; border-radius: 9999px; background: white;
      position: absolute; top: 2px; left: 2px; transition: left 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }
    .date-nav { display: flex; align-items: center; gap: 4px; }
    .date-btn {
      width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; cursor: pointer; border: none; background: none; color: #64615c;
    }
    .date-btn:hover { background: #f2f1f0; }
    .date-chip {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 6px; border: 0.7px solid #e1dfdd;
      font-size: 12px; color: #181716; cursor: pointer; background: white;
    }
    .date-chip:hover { background: #f8f7f6; }
    .topbar-av { width: 28px; height: 28px; border-radius: 9999px; background: #a78bfa; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: white; cursor: pointer; }

    /* ── Tab bar ─────────────────────────────── */
    #tabbar {
      height: 40px; flex-shrink: 0;
      border-bottom: 0.7px solid #f2f1f0;
      display: flex; align-items: flex-end; padding: 0 20px; gap: 16px;
    }
    .tab-item {
      padding: 8px 2px; font-size: 12px; color: #9b978f; cursor: pointer;
      border: none; background: none; border-bottom: 1.5px solid transparent; margin-bottom: -0.7px;
      line-height: 1; white-space: nowrap;
    }
    .tab-item:hover { color: #64615c; }
    .tab-item.active { color: #181716; font-weight: 500; border-bottom-color: #181716; }

    /* ── Toolbar ─────────────────────────────── */
    #toolbar {
      flex-shrink: 0;
      border-bottom: 0.7px solid #f2f1f0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px;
    }
    #toolbar-left { display: flex; align-items: center; gap: 0; }
    .view-tab {
      height: 32px; padding: 6px 8px; border-radius: 8px; font-size: 12px;
      color: #0b0a06; cursor: pointer; border: none; background: #f8f7f6;
      white-space: nowrap; line-height: 20px;
    }
    .view-tab:hover { background: #eeedec; }
    .view-tab-add {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; cursor: pointer; border: none; background: white;
    }
    .view-tab-add:hover { background: #f2f1f0; }
    #toolbar-right { display: flex; align-items: center; gap: 12px; }
    .col-sort-group {
      display: flex; align-items: center;
      border: 0.5px solid #e1dfdd; border-radius: 8px; overflow: hidden; flex-shrink: 0;
    }
    .col-sort-btn {
      height: 32px; padding: 0 8px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; background: white;
    }
    .col-sort-btn:first-child { background: #f2f0f0; border-right: 0.5px solid #e1dfdd; border-radius: 8px 0 0 8px; }
    .col-sort-btn:hover { background: #eeedec; }
    .search-box {
      display: flex; align-items: center; gap: 8px; width: 256px;
      border: 0.5px solid #e1dfdd; border-radius: 8px; padding: 6px 8px;
      height: 32px; background: white; cursor: text; flex-shrink: 0;
    }
    .search-box:hover { border-color: #d1cdc7; }
    .search-box span { font-size: 12px; color: #716f6c; line-height: 19px; }
    .filter-btn {
      display: flex; align-items: center; gap: 4px; padding: 8px;
      border: 0.5px solid #e1dfdd; border-radius: 8px; height: 32px;
      cursor: pointer; background: white; white-space: nowrap; flex-shrink: 0;
    }
    .filter-btn:hover { background: #f8f7f6; }
    .filter-btn span { font-size: 12px; color: #4d4a46; line-height: 18px; padding: 0 2px; }
    .create-btn {
      display: flex; align-items: center; gap: 4px; padding: 8px;
      background: #1967d4; border-radius: 8px; height: 32px;
      border: none; cursor: pointer; flex-shrink: 0;
    }
    .create-btn:hover { background: #1558b0; }
    .create-btn span { font-size: 12px; color: white; line-height: 18px; padding: 0 2px; }
    .more-btn {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border: 0.5px solid #e1dfdd; border-radius: 8px; cursor: pointer; background: white; flex-shrink: 0;
    }
    .more-btn:hover { background: #f8f7f6; }

    /* ── Table ───────────────────────────────── */
    #table-area { flex: 1; overflow-y: auto; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }

    /* Column headers */
    thead tr { border-bottom: 0.7px solid #f2f1f0; }
    th {
      padding: 0 12px; height: 36px; text-align: left;
      font-size: 11px; font-weight: 500; color: #9b978f;
      white-space: nowrap; user-select: none;
      position: sticky; top: 0; background: white; z-index: 5;
      border-bottom: 0.7px solid #f2f1f0;
    }
    th:first-child { padding-left: 20px; }
    th:last-child { padding-right: 20px; }
    th .th-inner { display: flex; align-items: center; gap: 3px; cursor: pointer; }
    th .th-inner:hover { color: #64615c; }

    /* Section rows */
    .section-row { cursor: pointer; }
    .section-row td {
      padding: 0; height: 36px;
      border-bottom: 0.7px solid #f2f1f0;
      background: #fff;
    }
    .section-row:hover td { background: #fafaf9; }
    .section-cell {
      display: flex; align-items: center; gap: 8px;
      padding: 0 20px; height: 36px;
    }
    .section-chevron { color: #9b978f; display: flex; align-items: center; transition: transform 0.15s; }
    .section-chevron.collapsed { transform: rotate(-90deg); }
    .section-name { font-size: 11px; font-weight: 600; color: #64615c; letter-spacing: 0.02em; }
    .section-count { font-size: 11px; color: #aba7a2; }
    .completed-badge {
      padding: 1px 6px; border-radius: 9999px; font-size: 10px; font-weight: 500;
      background: #dcfce7; color: #166534;
    }

    /* Task rows */
    .task-row { cursor: pointer; }
    .task-row td {
      padding: 0 12px; height: 44px;
      border-bottom: 0.7px solid #f2f1f0;
      vertical-align: middle; background: white;
    }
    .task-row td:first-child { padding-left: 20px; }
    .task-row td:last-child { padding-right: 20px; }
    .task-row:hover td { background: #fafaf9; }
    .task-row.selected td { background: #eff6ff !important; }

    /* Task name cell */
    .task-name-cell { display: flex; align-items: center; gap: 8px; }
    .task-indent { width: 20px; flex-shrink: 0; }
    .task-name { font-size: 13px; color: #181716; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 360px; }

    /* Status badges */
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500;
      white-space: nowrap;
    }

    /* Person cell */
    .person-cell { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .av-init {
      width: 20px; height: 20px; border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 600; flex-shrink: 0;
    }
    .person-name { font-size: 12px; color: #181716; }

    /* Date cell */
    .date-cell { font-size: 12px; color: #64615c; white-space: nowrap; }

    /* Tag cell */
    .tags-cell { display: flex; align-items: center; gap: 4px; flex-wrap: nowrap; }
    .tag-chip {
      padding: 2px 6px; border-radius: 6px; font-size: 10px;
      background: #f2f1f0; color: #64615c; white-space: nowrap;
    }

    /* ── Drawer ──────────────────────────────── */
    #drawer {
      position: fixed; top: 0; right: 0; width: 480px; height: 100vh;
      background: white;
      border-left: 0.7px solid #e1dfdd;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 40;
      overflow: hidden;
    }
    #drawer.open { transform: translateX(0); }
    #drawer iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── Overlay ─────────────────────────────── */
    #overlay {
      position: fixed; inset: 0; z-index: 39;
      display: none;
    }
    #overlay.show { display: block; }
  </style>
</head>

<script>
// ─────────────────────────────────────────
// Data
// ─────────────────────────────────────────
const STATUS_STYLES = {
  'not-started':      { label: 'Not started',  bg: '#f2f1f0', color: '#64615c' },
  'in-progress':      { label: 'In progress',  bg: '#e8f0fe', color: '#1967d4' },
  'preparing':        { label: 'Preparing',    bg: '#e8f0fe', color: '#1967d4' },

  'reviewing':        { label: 'Under review', bg: '#ede9fe', color: '#6d28d9' },
  'blocked':          { label: 'Blocked',      bg: '#fee793', color: '#3a3118' },
  'change-requested': { label: 'Change req.',  bg: '#ffd59a', color: '#402a13' },
  'completed':        { label: 'Completed',    bg: '#dcfce7', color: '#166534' },

// ─────────────────────────────────────────
// Render
// ─────────────────────────────────────────
function avatar(key) {
  const p = PEOPLE[key];
  return `<div class="av-init" style="background:${p.bg};color:${p.color};">${key}</div>`;
}

function statusBadge(key) {
  const s = STATUS_STYLES[key] || STATUS_STYLES['not-started'];
  return `<span class="status-badge" style="background:${s.bg};color:${s.color};">${s.label}</span>`;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  let html = '';

  SECTIONS.forEach(sec => {
    const countLabel = sec.completed ? '' : `(${sec.done}/${sec.total})`;
    const completedBadge = sec.completed ? '<span class="completed-badge">Completed</span>' : '';
    const chevronClass = sec.expanded ? '' : 'collapsed';

    html += `
      <tr class="section-row" data-section="${sec.id}">
        <td colspan="7">
          <div class="section-cell">
            <span class="section-chevron ${chevronClass}">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
            </span>
            <span class="section-name">${sec.id} ${sec.name}</span>
            <span class="section-count">${countLabel}</span>
            ${completedBadge}
          </div>
        </td>
      </tr>
    `;

    if (sec.expanded) {
      sec.tasks.forEach(task => {
        const prep = PEOPLE[task.prep];
        const rev  = PEOPLE[task.rev];
        html += `
          <tr class="task-row" data-task="${task.id}" data-scenario="${task.scenario || 'not-started'}">
            <td>
              <div class="task-name-cell">
                <div class="task-indent"></div>
                <span class="task-name">${task.name}</span>
              </div>
            </td>
            <td>${statusBadge(task.status)}</td>
            <td>
              <div class="person-cell">
                ${avatar(task.prep)}
                <span class="person-name">${prep.name}</span>
              </div>
            </td>
            <td><span class="date-cell">${task.prepDate}</span></td>
            <td>
              <div class="person-cell">
                ${avatar(task.rev)}
                <span class="person-name">${rev.name}</span>
              </div>
            </td>
            <td><span class="date-cell">${task.revDate}</span></td>
            <td>
              <div class="tags-cell">
                ${task.tags.map(t => `<span class="tag-chip">${t}</span>`).join('')}
              </div>
            </td>
          </tr>
        `;
      });
    }
  });

  tbody.innerHTML = html;
  attachRowListeners();
}

// ─────────────────────────────────────────
// Interactions
// ─────────────────────────────────────────
let selectedTaskId = null;

function attachRowListeners() {
  // Section collapse/expand
  document.querySelectorAll('.section-row').forEach(row => {
    row.addEventListener('click', () => {
      const id = row.dataset.section;
      const sec = SECTIONS.find(s => s.id === id);
      if (!sec || !sec.tasks.length) return;
      sec.expanded = !sec.expanded;
      renderTable();
    });
  });

  // Task rows → open drawer
  document.querySelectorAll('.task-row').forEach(row => {
    row.addEventListener('click', () => openDrawer(row));
  });
}

function openDrawer(row) {
  document.querySelectorAll('.task-row.selected').forEach(r => r.classList.remove('selected'));
  row.classList.add('selected');
  selectedTaskId = row.dataset.task;
  const scenario = row.dataset.scenario || 'not-started';
  document.getElementById('drawer-frame').src = `checklist-status.html?mode=drawer&scenario=${encodeURIComponent(scenario)}`;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.task-row.selected').forEach(r => r.classList.remove('selected'));
  selectedTaskId = null;
}

// Keyboard: Escape closes drawer
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDrawer();
});

// Listen for close signal from drawer iframe
window.addEventListener('message', e => {
  if (e.data === 'close-drawer') closeDrawer();
});

// Initial render
renderTable();
</script>
